jobs:
  - id: checkout-regression
    title: Checkout regression
    required: true
    command: PYTHONPATH=src python -c "from service import checkout; assert checkout(11) == 11; print('regression-ok')"
    related_assertion_statements:
      - "Checkout duplicates charges"
  - id: configuration-smoke
    title: Configuration smoke
    required: true
    command: MODE=full-capability python -c "import os; assert os.environ['MODE'] == 'full-capability'; print('config-ok')"
