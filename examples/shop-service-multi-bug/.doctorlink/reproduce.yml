reproductions:
  - id: repro-login-timeout
    title: "P1: Login always times out"
    kind: command
    command: PYTHONPATH=src python3 -c "from auth.service import login; print(login('alice','secret'))"
    expected: ok True
  - id: repro-token-invalid
    title: "P2: Expired token still invalid path"
    kind: command
    command: PYTHONPATH=src python3 -c "from auth.service import validate_token; print(validate_token('expired'))"
    expected: False
  - id: repro-api-404
    title: "P3: Missing user returns 500 instead of 404"
    kind: command
    command: PYTHONPATH=src python3 -c "from api.routes import get_user; print(get_user(404))"
    expected: status 404
  - id: repro-order-no-inventory
    title: "P4: Order created without inventory check"
    kind: command
    command: PYTHONPATH=src python3 -c "from api.routes import create_order; print(create_order([{'price':50000}]))"
    expected: inventory error
  - id: repro-db-pool
    title: "P5: DB pool exhausted after 3 acquires"
    kind: command
    command: PYTHONPATH=src python3 -c "from db.pool import acquire; [acquire() for _ in range(3)]"
    expected: RuntimeError
  - id: repro-cache-ttl
    title: "P6: Cache ignores TTL"
    kind: command
    command: PYTHONPATH=src python3 -c "from cache.client import set,get; set('k','v',ttl=1); print(get('k'))"
    expected: TTL enforced
