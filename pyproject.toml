[project]
name = "doctor-link"
version = "0.1.0"
description = "Universal diagnostic and AI collaboration tool for software debugging."
readme = "README.md"
requires-python = ">=3.10"
authors = [
  { name = "linkyang01" }
]
dependencies = [
  "click>=8.1.7",
  "jinja2>=3.1.0",
  "PyYAML>=6.0.0"
]

[project.scripts]
doctor-link = "doctor_link.cli:main"

[tool.setuptools.packages.find]
include = ["doctor_link*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
