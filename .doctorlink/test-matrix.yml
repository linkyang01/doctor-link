name: Doctor link P4 Test Matrix
jobs:
  - id: cli-help
    title: CLI help should run
    command: doctor-link --help
    required: true
    related_verification_steps:
      - cli-smoke
  - id: unit-tests
    title: Python unit tests should pass
    command: pytest -q
    required: true
    related_verification_steps:
      - pytest

cases:
  - id: generate_standard_package
    type: diagnostic_package
    required: true
    expected:
      - summary.md
      - problem-map.md
      - timeline.md
      - evidence-list.md
      - doctor-report.json
      - ai-context.json
      - ai-task.md
      - fix-verification-checklist.md
      - user-assertions.json

  - id: add_user_assertion
    type: human_assertion
    required: true
    expected:
      - user assertion is written to user-assertions.json
      - ai-task.md includes human-confirmed issue warning
      - problem-map.md includes human-confirmed issue

  - id: generate_verification_checklist
    type: verification
    required: true
    expected:
      - fix-verification-checklist.md exists
      - checklist contains user-confirmed issue when present
