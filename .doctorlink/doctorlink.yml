project:
  name: doctor-link
  type: diagnostic-tool
  adapter: generic

collect:
  project_root: .
  environment:
    - system
    - python
    - project
  logs: []
  commands:
    - python --version
    - doctor-link --help
  probes: []
  attachments: []

package:
  output_dir: DoctorReports
  max_file_size: 1000000

ai:
  principles:
    - evidence_first
    - human_assertion_first
    - no_unverified_fix_claims
  boundaries:
    - do not rewrite unrelated modules without evidence
    - do not ignore human-confirmed issues without evidence
  outputs:
    - ai-context.json
    - ai-task.md
    - fix-verification-checklist.md
