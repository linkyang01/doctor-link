name: Self Validation

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Base validation
        run: |
          ruff check doctor_link tests scripts
          pytest -q --cov=doctor_link --cov-branch --cov-fail-under=85 --cov-report=term-missing --cov-report=xml
          python -m build
      - name: Self validation
        run: |
          bash scripts/self_validate_doctor_link.sh DoctorLinkSelfValidation
      - name: P7 runtime validation
        run: |
          bash scripts/p7_runtime_validate.sh "$(pwd)"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: self-validation
          path: |
            DoctorLinkSelfValidation/**
            .doctorlink-p7-runtime/**
            coverage.xml
            dist/**
          if-no-files-found: warn
