name: Doctor link CI

permissions:
  contents: read

concurrency:
  group: doctor-link-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
          python -m pip check

      - name: Run static checks
        run: |
          ruff check doctor_link tests scripts

      - name: Run tests with coverage
        run: |
          set -o pipefail
          pytest -q --cov=doctor_link --cov-branch --cov-fail-under=85 --cov-report=term-missing --cov-report=xml 2>&1 | tee pytest-output.log

      - name: Run CLI smoke tests
        run: |
          doctor-link --help
          doctor-link init DoctorWorkspace
          mkdir -p VlyTestLibrary/01-BasicFormats
          echo "sample" > VlyTestLibrary/01-BasicFormats/sample.mp4
          doctor-link scan VlyTestLibrary
          doctor-link plan VlyTestLibrary
          doctor-link report VlyTestLibrary --out DoctorReports
          PACKAGE_DIR=$(find DoctorReports -mindepth 1 -maxdepth 1 -type d | head -n 1)
          test -f "$PACKAGE_DIR/doctor-report.json"
          if doctor-link verify "$PACKAGE_DIR" --write-back --json > verification-smoke.json; then
            echo "Expected an evidence-incomplete smoke package to return non-zero"
            exit 1
          fi
          grep -q '"status": "missing_evidence"' verification-smoke.json
          doctor-link view "$PACKAGE_DIR" --build-only
          test -f "$PACKAGE_DIR/.doctorlink-web/index.html"

      - name: Run E2E validation
        run: |
          bash scripts/e2e_validate.sh "$(pwd)"

      - name: Build wheel and source distribution
        run: |
          python -m build
          test -n "$(find dist -name '*.whl' -print -quit)"
          test -n "$(find dist -name '*.tar.gz' -print -quit)"
          python scripts/validate_distribution_contents.py dist
          python -m twine check dist/*

      - name: Run P7 runtime validation
        run: |
          bash scripts/p7_runtime_validate.sh "$(pwd)"

      - name: Smoke test installed wheel
        run: |
          python -m venv .wheel-smoke
          . .wheel-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          doctor-link --help
          doctor-link strategy validate . --json
          deactivate

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: doctor-link-test-results-${{ matrix.python-version }}
          path: |
            pytest-output.log
            coverage.xml
            dist/**
            .doctorlink-e2e/**
            .doctorlink-p7-runtime/**
            DoctorReports/**
          if-no-files-found: warn

  package:
    name: Build and install wheel
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build wheel and source distribution
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          test -n "$(find dist -name '*.whl' -print -quit)"
          test -n "$(find dist -name '*.tar.gz' -print -quit)"
          python scripts/validate_distribution_contents.py dist
          python -m twine check dist/*

      - name: Install wheel and run validation
        run: |
          python -m venv /tmp/doctor-link-wheel-smoke
          . /tmp/doctor-link-wheel-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python -m pip check
          doctor-link --help
          doctor-link preflight . --json
          bash scripts/validate_doctor_link.sh /tmp/DoctorLinkValidation
          bash scripts/p7_runtime_validate.sh "$(pwd)"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: doctor-link-package-artifacts
          path: |
            dist/**
            .doctorlink-p7-runtime/**
          if-no-files-found: error

  security:
    name: Security checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and security tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Scan source for high-confidence security issues
        run: bandit -r doctor_link -ll

      - name: Audit installed dependencies
        run: pip-audit

  cross-platform-smoke:
    name: Smoke ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install source package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
          python -m pip check

      - name: Run cross-platform smoke checks
        run: |
          doctor-link --version
          doctor-link strategy validate . --json
          doctor-link preflight . --json
          python -m pytest -q tests/test_cli_minimal.py tests/test_diagnosis_strategy.py tests/test_preflight.py
