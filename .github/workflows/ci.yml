name: Doctor link CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest

      - name: Run tests
        run: |
          pytest -q --junitxml=junit/test-results-${{ matrix.python-version }}.xml

      - name: Run CLI smoke tests
        run: |
          doctor-link --help
          doctor-link init DoctorWorkspace
          mkdir -p VlyTestLibrary/01-BasicFormats
          echo "sample" > VlyTestLibrary/01-BasicFormats/sample.mp4
          echo "subtitle" > VlyTestLibrary/01-BasicFormats/sample.srt
          echo "audio" > VlyTestLibrary/01-BasicFormats/sample.dts
          doctor-link scan VlyTestLibrary
          doctor-link plan VlyTestLibrary
          doctor-link report VlyTestLibrary --out DoctorReports
          doctor-link ai-task VlyTestLibrary --out DoctorReports
          doctor-link env --project-root . --out DoctorReports/environment-smoke.json
          doctor-link probe VlyTestLibrary/01-BasicFormats/sample.mp4 --ffprobe missing-ffprobe-for-ci --summary --out DoctorReports/probe-smoke.json
          PACKAGE_DIR=$(find DoctorReports -mindepth 1 -maxdepth 1 -type d | head -n 1)
          cp "$PACKAGE_DIR/doctor-report.json" DoctorReports/before-smoke.json
          doctor-link vly-proof VlyTestLibrary --out DoctorReports/vly-proof-smoke.md --package-dir "$PACKAGE_DIR"
          doctor-link record "$PACKAGE_DIR" --name "CI playback smoke" --status partial --expected "Sample should be playable" --actual "Placeholder media cannot be probed as playable" --file VlyTestLibrary/01-BasicFormats/sample.mp4 --note "CI smoke record"
          doctor-link compare DoctorReports/before-smoke.json "$PACKAGE_DIR/doctor-report.json" --out DoctorReports/comparison-smoke --package-dir "$PACKAGE_DIR"
          doctor-link doctor-package "$PACKAGE_DIR" --out DoctorReports/doctor-package-smoke.zip --exclude-attachments --max-file-size 1000000

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: doctor-link-test-results-${{ matrix.python-version }}
          path: |
            junit/test-results-${{ matrix.python-version }}.xml
            DoctorReports/**
          if-no-files-found: warn
