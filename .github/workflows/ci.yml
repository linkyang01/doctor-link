name: Doctor link CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest pytest-cov build ruff

      - name: Run static checks
        run: |
          ruff check doctor_link tests scripts

      - name: Run tests with coverage
        run: |
          mkdir -p junit
          pytest -q --cov=doctor_link --cov-report=term-missing --cov-report=xml --junitxml=junit/test-results-${{ matrix.python-version }}.xml

      - name: Run CLI smoke tests
        run: |
          doctor-link --help
          doctor-link init DoctorWorkspace
          mkdir -p VlyTestLibrary/01-BasicFormats
          echo "sample" > VlyTestLibrary/01-BasicFormats/sample.mp4
          doctor-link scan VlyTestLibrary
          doctor-link plan VlyTestLibrary
          doctor-link report VlyTestLibrary --out DoctorReports
          PACKAGE_DIR=$(find DoctorReports -mindepth 1 -maxdepth 1 -type d | head -n 1)
          test -f "$PACKAGE_DIR/doctor-report.json"
          doctor-link verify "$PACKAGE_DIR" --write-back
          doctor-link view "$PACKAGE_DIR" --build-only
          test -f "$PACKAGE_DIR/.doctorlink-web/index.html"

      - name: Run E2E validation
        run: |
          bash scripts/e2e_validate.sh "$(pwd)"

      - name: Build wheel and source distribution
        run: |
          python -m build
          test -n "$(find dist -name '*.whl' -print -quit)"
          test -n "$(find dist -name '*.tar.gz' -print -quit)"

      - name: Run P7 runtime validation
        run: |
          bash scripts/p7_runtime_validate.sh "$(pwd)"

      - name: Smoke test installed wheel
        run: |
          python -m venv .wheel-smoke
          . .wheel-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          doctor-link --help
          doctor-link strategy validate . --json
          deactivate

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: doctor-link-test-results-${{ matrix.python-version }}
          path: |
            junit/test-results-${{ matrix.python-version }}.xml
            coverage.xml
            dist/**
            .doctorlink-e2e/**
            .doctorlink-p7-runtime/**
            DoctorReports/**
          if-no-files-found: warn

  package:
    name: Build and install wheel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build wheel and source distribution
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build
          test -n "$(find dist -name '*.whl' -print -quit)"
          test -n "$(find dist -name '*.tar.gz' -print -quit)"

      - name: Install wheel and run validation
        run: |
          python -m venv /tmp/doctor-link-wheel-smoke
          . /tmp/doctor-link-wheel-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          doctor-link --help
          bash scripts/validate_doctor_link.sh /tmp/DoctorLinkValidation
          bash scripts/p7_runtime_validate.sh "$(pwd)"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: doctor-link-package-artifacts
          path: |
            dist/**
            .doctorlink-p7-runtime/**
          if-no-files-found: error
