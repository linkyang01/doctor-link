name: Publish GitHub release to PyPI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing immutable GitHub Release tag to publish
        required: true
        default: v0.6.0
      confirmation:
        description: Type publish-doctor-link-to-pypi
        required: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Require explicit confirmation
        env:
          CONFIRMATION: ${{ inputs.confirmation }}
        run: test "${CONFIRMATION}" = "publish-doctor-link-to-pypi"

      - name: Checkout immutable release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Download published GitHub assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: gh release download "${RELEASE_TAG}" --dir dist --pattern "doctor_link-*"

      - name: Validate version, contents, and metadata
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install twine
          PACKAGE_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          test "${RELEASE_TAG}" = "v${PACKAGE_VERSION}"
          python scripts/validate_distribution_contents.py dist
          python -m twine check dist/*

      - name: Validate isolated wheel installation
        run: |
          python -m venv /tmp/doctor-link-pypi-wheel
          /tmp/doctor-link-pypi-wheel/bin/python -m pip install dist/*.whl
          /tmp/doctor-link-pypi-wheel/bin/python -m pip check
          /tmp/doctor-link-pypi-wheel/bin/doctor-link --version

      - name: Transfer validated distributions
        uses: actions/upload-artifact@v7
        with:
          name: pypi-distributions
          path: dist/*
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/doctor-link/
    permissions:
      id-token: write
    steps:
      - name: Download validated distributions
        uses: actions/download-artifact@v8
        with:
          name: pypi-distributions
          path: dist

      - name: Publish with PyPI Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          print-hash: true
