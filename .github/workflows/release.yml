name: Release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or commit to release from
        required: true
        default: main
      tag:
        description: Git tag to create or update
        required: true
        default: v0.3.0
      body_path:
        description: Release notes markdown path in the repository
        required: true
        default: docs/validation/v0.3.0-release-notes.md
      prerelease:
        description: Mark GitHub release as pre-release
        required: true
        default: "false"
      publish_pypi:
        description: Upload wheel to PyPI when PYPI_API_TOKEN is configured
        required: true
        default: "false"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Run tests before release
        run: |
          python -m pip install -e '.[dev]'
          ruff check doctor_link tests scripts
          pytest -q --cov=doctor_link --cov-branch --cov-fail-under=85
          bandit -r doctor_link -ll
          pip-audit

      - name: Validate release inputs
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_BODY: ${{ inputs.body_path }}
        run: |
          PACKAGE_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          test "${RELEASE_TAG}" = "v${PACKAGE_VERSION}"
          test -f "${RELEASE_BODY}"
          if git rev-parse --verify --quiet "refs/tags/${RELEASE_TAG}"; then
            echo "Release tag already exists and will not be moved: ${RELEASE_TAG}"
            exit 1
          fi

      - name: Build distributions
        run: |
          python -m build
          python scripts/validate_distribution_contents.py dist
          python -m twine check dist/*

      - name: Validate installed release wheel
        run: |
          python -m venv /tmp/doctor-link-release-wheel
          . /tmp/doctor-link-release-wheel/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python -m pip check
          node --version
          npm --version
          python examples/full-capability-lab/run-all.py \
            --doctor-link "$(command -v doctor-link)" \
            --dist dist \
            --out .doctorlink-full-capability-release
          deactivate

      - name: Create immutable release tag
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${RELEASE_TAG}" -m "Doctor link ${RELEASE_TAG}"
          git push origin "${RELEASE_TAG}"

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          name: Doctor link ${{ inputs.tag }}
          prerelease: ${{ inputs.prerelease == 'true' }}
          generate_release_notes: false
          body_path: ${{ inputs.body_path }}
          files: |
            dist/*

      - name: Publish to PyPI
        if: inputs.publish_pypi == 'true'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "${TWINE_PASSWORD}" ]; then
            echo "PYPI_API_TOKEN secret is not configured; skipping PyPI upload."
            exit 0
          fi
          python -m twine upload dist/*
