name: Release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or commit to release from
        required: true
        default: main
      tag:
        description: Git tag to create or update
        required: true
        default: v0.1.1
      body_path:
        description: Release notes markdown path in the repository
        required: true
        default: docs/validation/v0.1.1-release-notes.md
      prerelease:
        description: Mark GitHub release as pre-release
        required: true
        default: "false"
      publish_pypi:
        description: Upload wheel to PyPI when PYPI_API_TOKEN is configured
        required: true
        default: "false"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Run tests before release
        run: |
          python -m pip install -e .
          python -m pip install pytest ruff
          ruff check doctor_link tests scripts
          pytest -q

      - name: Create or update release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa "${{ inputs.tag }}" -m "Doctor link ${{ inputs.tag }}"
          git push origin "${{ inputs.tag }}" --force

      - name: Build distributions
        run: python -m build

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: Doctor link ${{ inputs.tag }}
          prerelease: ${{ inputs.prerelease == 'true' }}
          generate_release_notes: false
          body_path: ${{ inputs.body_path }}
          files: |
            dist/*

      - name: Publish to PyPI
        if: inputs.publish_pypi == 'true'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "${TWINE_PASSWORD}" ]; then
            echo "PYPI_API_TOKEN secret is not configured; skipping PyPI upload."
            exit 0
          fi
          python -m twine upload dist/*